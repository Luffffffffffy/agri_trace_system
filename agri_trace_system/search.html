<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <!-- 設定字元編碼，避免中文亂碼 -->
  <meta charset="UTF-8">

  <!-- 響應式設定 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 分頁標題 -->
  <title>資料查詢</title>

  <!-- 載入共用樣式 -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 頁首 -->
  <header>
    <h1>農產品供應鏈追蹤系統</h1>

    <!-- 導覽列 -->
    <nav>
      <a href="index.html">首頁</a>
      <a href="search.html">履歷查詢</a>
      <a href="producer.html">查詢生產者</a>
      <a href="inspection.html">查詢檢驗資訊</a>
    </nav>
  </header>

  <!-- 主要內容 -->
  <div class="container">

    <!-- 頁面說明 -->
    <div class="card">
      <h2>資料查詢</h2>
      <p>可依追溯編號、採樣日期、產品名稱、產品編號、生產者名稱、採樣地點、檢驗結果與備註類型查詢資料。</p>
    </div>

    <!-- 查詢條件區 -->
    <div class="card">
      <h2>查詢條件</h2>

      <!-- 第一列查詢條件 -->
      <div class="grid-4">

        <!-- 追溯編號 -->
        <div>
          <label for="number">追溯編號</label>
          <input type="text" id="number" placeholder="例：TGAP1140610128">
        </div>

        <!-- 採樣日期 -->
        <div>
          <label for="samplingDate">採樣日期</label>
          <input type="text" id="samplingDate" placeholder="例：1140730">
        </div>

        <!-- 產品名稱 -->
        <div>
          <label for="productName">產品名稱</label>
          <input type="text" id="productName" placeholder="例：番石榴">
        </div>

        <!-- 產品編號 -->
        <div>
          <label for="productId">產品編號</label>
          <input type="text" id="productId" placeholder="請輸入產品編號">
        </div>

      </div>

      <!-- 第二列查詢條件 -->
      <div class="grid-4">

        <!-- 生產者名稱 -->
        <div>
          <label for="producerName">生產者名稱</label>
          <input type="text" id="producerName" placeholder="請輸入生產者名稱">
        </div>

        <!-- 採樣地點 -->
        <div>
          <label for="samplingLocation">採樣地點</label>
          <input type="text" id="samplingLocation" placeholder="例：高雄市岡山區">
        </div>

        <!-- 檢驗結果 -->
        <div>
          <label for="inspectResult">檢驗結果</label>
          <select id="inspectResult">
            <option value="">請選擇</option>
            <option value="合格">合格</option>
            <option value="不合格">不合格</option>
          </select>
        </div>

        <!-- 備註類型 -->
        <div>
          <label for="note">備註類型</label>
          <select id="note">
            <option value="">請選擇</option>
            <option value="僅標示">僅標示</option>
            <option value="農藥殘留">農藥殘留</option>
            <option value="重金屬">重金屬</option>
          </select>
        </div>

      </div>

      <!-- 按鈕區 -->
      <div class="button-row">
        <button onclick="searchData()">查詢</button>
        <button onclick="showAllData()">列出全部</button>
      </div>
    </div>

    <!-- 查詢結果區 -->
    <div class="card">
      <h2>查詢結果</h2>

      <div class="table-wrapper">
        <table class="result-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>追溯編號</th>
              <th>採樣日期</th>
              <th>產品名稱</th>
              <th>產品編號</th>
              <th>生產者名稱</th>
              <th>採樣地點</th>
              <th>檢驗結果</th>
              <th>備註</th>
              <th>建立時間</th>
            </tr>
          </thead>
          <tbody id="searchResultBody">
            <tr>
              <td colspan="10">尚未查詢資料</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- 載入查詢功能 JS -->
  <script src="js/search.js"></script>
</body>
</html>
