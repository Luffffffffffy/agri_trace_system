<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <!-- 設定編碼，避免中文亂碼 -->
  <meta charset="UTF-8">

  <!-- 響應式設計設定 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 頁面標題 -->
  <title>履歷查詢</title>

  <!-- 連接 CSS 樣式 -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 頁首與導覽列 -->
  <header>
    <h1>農產品供應鏈追蹤系統</h1>
    <nav>
      <a href="index.html">首頁</a>
      <a href="search.html">履歷查詢</a>
      <a href="admin.html">後台登錄</a>
    </nav>
  </header>

  <!-- 主要內容區 -->
  <div class="container">

    <!-- 查詢表單卡片 -->
    <div class="card">
      <h2>履歷查詢</h2>

      <!-- 兩欄排版：追溯碼與產品名稱 -->
      <div class="grid-2">

        <!-- 追溯碼輸入欄位 -->
        <div>
          <label>追溯碼</label>
          <input type="text" id="traceCode" placeholder="請輸入追溯碼">
        </div>

        <!-- 產品名稱輸入欄位 -->
        <div>
          <label>產品名稱</label>
          <input type="text" id="productName" placeholder="請輸入產品名稱">
        </div>

      </div>

      <!-- 三欄排版：縣市、產品類別、QR Code -->
      <div class="grid-3">

        <!-- 縣市選單 -->
        <div>
          <label>縣市</label>
          <select id="city">
            <option value="">請選擇縣市</option>
            <option>台北市</option>
            <option>台中市</option>
            <option>台南市</option>
            <option>高雄市</option>
            <option>雲林縣</option>
          </select>
        </div>

        <!-- 產品類別選單 -->
        <div>
          <label>產品類別</label>
          <select id="category">
            <option value="">請選擇類別</option>
            <option>蔬菜</option>
            <option>水果</option>
            <option>稻米</option>
            <option>茶葉</option>
          </select>
        </div>

        <!-- QR Code 按鈕 -->
        <div>
          <label>QR Code</label>

          <!-- 目前先用 alert 模擬功能 -->
          <button type="button" onclick="alert('之後可接 QR Code 掃描功能')">
            掃描 QR Code
          </button>
        </div>

      </div>

      <!-- 查詢按鈕，按下後執行 searchProduct() -->
      <button onclick="searchProduct()">查詢</button>
    </div>

    <!-- 顯示查詢結果的區域 -->
    <div class="card">
      <h2>查詢結果</h2>
      <div id="resultArea">尚未查詢資料</div>
    </div>

  </div>

  <!-- 載入查詢頁專用 JavaScript -->
  <script src="js/search.js"></script>
</body>
</html>
